<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Доли каналов привлечения по клиникам</title>
  <style>
    :root {
      --dumskaya: #20a4c6;
      --flandria: #e06f2f;
      --moskva: #4f8f45;
      --text: #202020;
      --muted: #777;
      --line: #e7e7e7;
      --panel: #f7f7f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 1800px;
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 800;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    select, button {
      min-height: 24px;
      border: 1px solid #cfcfcf;
      border-radius: 4px;
      background: #fff;
      color: var(--text);
      font-size: 11px;
      padding: 3px 7px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    button.active {
      color: #fff;
      background: #222;
      border-color: #222;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--panel);
      border-radius: 5px;
      padding: 7px 9px;
    }

    .metric-label {
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 10px;
    }

    .metric-value {
      font-size: 14px;
      line-height: 1.15;
      font-weight: 800;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px 18px;
      align-items: start;
    }

    .chart {
      min-width: 0;
      padding-top: 1px;
      break-inside: avoid;
    }

    .chart-title {
      margin: 0 0 8px;
      color: #000;
      font-size: 20px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
    }

    .chart-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: -3px 0 8px;
      color: var(--muted);
      font-size: 9px;
    }

    .rows {
      display: grid;
      gap: 4px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(110px, 36%) minmax(110px, 1fr) max-content;
      align-items: center;
      gap: 8px;
      min-height: 20px;
    }

    .label {
      font-size: 11px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .bar-track {
      position: relative;
      height: 20px;
      min-width: 0;
    }

    .bar {
      height: 100%;
      min-width: 1px;
    }

    .value {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .value.inside {
      left: 5px;
      color: #fff;
    }

    .value.outside {
      color: var(--text);
    }

    .revenue {
      color: var(--text);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
      text-align: right;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 24px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .footer {
      margin-top: 20px;
      color: #888;
      font-size: 10px;
    }

    @media (max-width: 1180px) {
      .charts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 12px 10px 24px;
      }

      .topbar {
        display: block;
      }

      .controls {
        justify-content: flex-start;
        margin-top: 9px;
      }

      .summary,
      .charts {
        grid-template-columns: 1fr;
      }

      .chart-title {
        font-size: 18px;
      }

      .row {
        grid-template-columns: minmax(105px, 36%) minmax(100px, 1fr) max-content;
      }
    }
  </style>
</head>
<body>

    const clinicColors = {
      dumskaya: getCss("--dumskaya"),
      flandria: getCss("--flandria"),
      moskva: getCss("--moskva")
    };

    const clinicFilter = document.getElementById("clinicFilter");
    const yearFilter = document.getElementById("yearFilter");
    const allButton = document.getElementById("allButton");
    const charts = document.getElementById("charts");
    const summary = document.getElementById("summary");

    function getCss(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function unique(values) {
      return Array.from(new Set(values)).sort();
    }

    function formatShare(value) {
      return new Intl.NumberFormat("ru-RU", {
        minimumFractionDigits: value < 1 ? 2 : 0,
        maximumFractionDigits: value < 10 ? 2 : 1
      }).format(value);
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("ru-RU", {
        maximumFractionDigits: 0
      }).format(value);
    }

    function option(value, label) {
      const item = document.createElement("option");
      item.value = value;
      item.textContent = label;
      return item;
    }

    function fillFilters() {
      clinicFilter.appendChild(option("all", "Все клиники"));
      unique(reports.map(report => report.clinic)).forEach(clinic => {
        clinicFilter.appendChild(option(clinic, clinic));
      });

      yearFilter.appendChild(option("all", "Все годы"));
      unique(reports.map(report => report.year)).forEach(year => {
        yearFilter.appendChild(option(year, year));
      });
    }

    function filteredReports() {
      const clinic = clinicFilter.value;
      const year = yearFilter.value;
      return reports.filter(report => {
        return (clinic === "all" || report.clinic === clinic)
          && (year === "all" || report.year === year);
      });
    }

    function renderSummary(items) {
      const totalRevenue = items.reduce((sum, report) => sum + report.totalRevenue, 0);
      const clinicCount = unique(items.map(report => report.clinic)).length;
      summary.innerHTML = "";

      [
        ["Графиков", items.length],
        ["Клиник", clinicCount],
        ["Выручка", formatMoney(totalRevenue)]
      ].forEach(([label, value]) => {
        const card = document.createElement("div");
        card.className = "metric";
        card.innerHTML = `<div class="metric-label">${label}</div><div class="metric-value">${value}</div>`;
        summary.appendChild(card);
      });
    }

    function renderChart(report) {
      const color = clinicColors[report.clinic] || "#333";
      const section = document.createElement("article");
      section.className = "chart";

      const title = document.createElement("h2");
      title.className = "chart-title";
      title.textContent = `${report.clinic}_${report.year}`;
      section.appendChild(title);

      const meta = document.createElement("div");
      meta.className = "chart-meta";
      meta.innerHTML = `<span>Выручка: ${formatMoney(report.totalRevenue)}</span><span>Дней: ${report.days}</span>`;
      section.appendChild(meta);

      const rows = document.createElement("div");
      rows.className = "rows";

      report.channels.forEach(channel => {
        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = channel.channel;

        const track = document.createElement("div");
        track.className = "bar-track";

        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.width = `${Math.max(channel.share, 0)}%`;
        bar.style.backgroundColor = color;

        const value = document.createElement("span");
        const inside = channel.share >= 5;
        value.className = `value ${inside ? "inside" : "outside"}`;
        value.textContent = `${formatShare(channel.share)}%`;
        if (!inside) {
          value.style.left = `calc(${Math.max(channel.share, 0)}% + 5px)`;
        }

        const revenue = document.createElement("div");
        revenue.className = "revenue";
        revenue.textContent = `${formatMoney(channel.revenue)} руб`;

        track.appendChild(bar);
        track.appendChild(value);
        row.appendChild(label);
        row.appendChild(track);
        row.appendChild(revenue);
        rows.appendChild(row);
      });

      section.appendChild(rows);
      return section;
    }

    function render() {
      const items = filteredReports();
      allButton.classList.toggle("active", clinicFilter.value === "all" && yearFilter.value === "all");
      renderSummary(items);
      charts.innerHTML = "";

      if (!items.length) {
        charts.innerHTML = '<div class="empty">Нет данных для выбранного фильтра.</div>';
        return;
      }

      items.forEach(report => charts.appendChild(renderChart(report)));
    }

    fillFilters();
    clinicFilter.addEventListener("change", render);
    yearFilter.addEventListener("change", render);
    allButton.addEventListener("click", () => {
      clinicFilter.value = "all";
      yearFilter.value = "all";
      render();
    });
    render();
  </script>
